<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #16202e;
    --text-dim: #6b7686;
    --accent: #d95f38;
    --accent-soft: rgba(217,95,56,.12);
    --border: rgba(22,32,46,.08);
    --tabbar: rgba(255,255,255,.92);
    --read: #9aa4b2;
    --shadow: 0 1px 3px rgba(22,32,46,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1b2d;
      --card: #182741;
      --text: #e8edf5;
      --text-dim: #8b98ac;
      --accent: #e8734a;
      --accent-soft: rgba(232,115,74,.16);
      --border: rgba(232,237,245,.07);
      --tabbar: rgba(15,27,45,.92);
      --read: #5d6b80;
      --shadow: 0 1px 3px rgba(0,0,0,.25);
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html { height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height:100%;
    padding-bottom: calc(76px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top:0; z-index:10;
    background: var(--tabbar);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand { display:flex; align-items:baseline; gap:8px; }
  .brand h1 { font-size:20px; font-weight:800; letter-spacing:-.3px; }
  .brand h1 em { color: var(--accent); font-style: normal; }
  .brand .count { font-size:12px; color:var(--text-dim); font-weight:500; }
  .hbtns { display:flex; gap:8px; }
  .hbtn {
    border:none; background: var(--accent-soft); color: var(--accent);
    font: inherit; font-size:13px; font-weight:600;
    padding: 7px 12px; border-radius: 999px; cursor:pointer;
  }
  .hbtn:active { opacity:.6; }
  .hbtn.spin svg { animation: rot 1s linear infinite; }
  @keyframes rot { to { transform: rotate(360deg); } }
  main { padding: 14px 14px 8px; max-width: 640px; margin: 0 auto; }
  .status { font-size:12px; color:var(--text-dim); text-align:center; padding: 4px 0 12px; min-height: 18px; }
  .card {
    display:block; background: var(--card); border-radius: 14px;
    padding: 13px 14px; margin-bottom: 10px;
    text-decoration: none; color: inherit;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .card:active { transform: scale(.985); }
  .meta { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .src {
    font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase;
    color: var(--accent);
  }
  .lang {
    font-size:10px; font-weight:700; color:var(--text-dim);
    border:1px solid var(--border); border-radius:4px; padding:1px 4px;
  }
  .ago { font-size:11px; color: var(--text-dim); margin-left:auto; flex-shrink:0; }
  .card h2 { font-size:16px; font-weight:650; line-height:1.35; letter-spacing:-.1px; }
  .card.read { opacity:.55; }
  .card.read h2 { color: var(--read); font-weight:500; }
  .done {
    text-align:center; padding: 42px 20px 30px; color: var(--text-dim);
  }
  .done .big { font-size:40px; margin-bottom:10px; }
  .done .msg { font-size:16px; font-weight:650; color:var(--text); margin-bottom:6px; }
  .done .sub { font-size:13px; line-height:1.5; }
  .failnote { font-size:11px; color:var(--text-dim); text-align:center; padding: 10px 0 20px; }
  nav {
    position: fixed; left:0; right:0; bottom:0; z-index:10;
    background: var(--tabbar);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    border-top: 1px solid var(--border);
    display:flex; justify-content:space-around;
    padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
  }
  .tab {
    flex:1; border:none; background:none; cursor:pointer;
    font: inherit; color: var(--text-dim);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding: 4px 0; position:relative;
  }
  .tab .ico { font-size:20px; line-height:1; filter: grayscale(1) opacity(.55); }
  .tab .lbl { font-size:10.5px; font-weight:600; }
  .tab.active { color: var(--accent); }
  .tab.active .ico { filter:none; }
  .tab .badge {
    position:absolute; top:-1px; right: calc(50% - 22px);
    background: var(--accent); color:#fff;
    font-size:9.5px; font-weight:700;
    min-width:16px; height:16px; border-radius:8px;
    display:flex; align-items:center; justify-content:center; padding:0 4px;
  }
  .tab .badge.zero { display:none; }
  .skel { height:74px; border-radius:14px; margin-bottom:10px;
    background: linear-gradient(100deg, var(--card) 40%, var(--accent-soft) 50%, var(--card) 60%);
    background-size: 200% 100%; animation: sh 1.2s infinite; border:1px solid var(--border); }
  @keyframes sh { to { background-position: -200% 0; } }
</style>
</head>

<script>
'use strict';

/* ---------- config ---------- */
var SECTIONS = [

    { name:'Guardian Biz',   url:'https://www.theguardian.com/uk/business/rss' },
    { name:'MarketWatch',    url:'https://feeds.content.dowjones.io/public/rss/mw_topstories' },
    { name:'CNBC',           url:'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114' },
    { name:'Yahoo Finance',  url:'https://finance.yahoo.com/news/rssindex' }
  ]},
  { id:'danmark', label:'Danmark', icon:'🇩🇰', feeds:[
    { name:'DR Nyheder', url:'https://www.dr.dk/nyheder/service/feeds/allenyheder', lang:'DA' },
    { name:'DR Penge',   url:'https://www.dr.dk/nyheder/service/feeds/penge', lang:'DA' },
    { name:'CPH Post',   url:'https://cphpost.dk/feed/' },
    { name:'Politico EU',url:'https://www.politico.eu/feed/' }
  ]}
];
var PER_FEED = 8, PER_SECTION = 18, CACHE_MIN = 25;
var PROXIES = [
  function(u){ return u; },
  function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
  function(u){ return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); },
  function(u){ return 'https://corsproxy.io/?url=' + encodeURIComponent(u); }
];

/* ---------- safe storage (falls back to memory) ---------- */
var mem = {};
var store = {
  get: function(k){ try { var v = localStorage.getItem(k); return v===null ? (k in mem ? mem[k] : null) : v; } catch(e){ return k in mem ? mem[k] : null; } },
  set: function(k,v){ mem[k]=v; try { localStorage.setItem(k,v); } catch(e){} }
};

/* ---------- state ---------- */
var readSet = {};
try { readSet = JSON.parse(store.get('ob_read') || '{}'); } catch(e){ readSet = {}; }
var items = {};      // sectionId -> [item]
var failed = [];
var current = store.get('ob_tab') || 'world';
var loading = false;
var runSeq = 0;

function hash(s){ var h=5381,i=s.length; while(i) h=(h*33)^s.charCodeAt(--i); return (h>>>0).toString(36); }
function saveRead(){
  // prune: keep only ids seen in current items (plus cap total) so it never grows forever
  var keep={}, n=0;
  for (var sid in items) items[sid].forEach(function(it){ if(readSet[it.id]) keep[it.id]=1; });
  for (var k in readSet){ if(!(k in keep) && n<400){ keep[k]=1; n++; } }
  readSet = keep;
  store.set('ob_read', JSON.stringify(readSet));
}

/* ---------- fetching ---------- */
function fetchTimeout(url, ms){
  return new Promise(function(res, rej){
    var ctl = ('AbortController' in window) ? new AbortController() : null;
    var t = setTimeout(function(){ if(ctl) ctl.abort(); rej(new Error('timeout')); }, ms);
    fetch(url, ctl ? {signal: ctl.signal} : {}).then(function(r){
      clearTimeout(t);
      if(!r.ok) return rej(new Error('http '+r.status));
      r.text().then(res, rej);
    }, function(e){ clearTimeout(t); rej(e); });
  });
}
function fetchFeed(feed){
  var i = 0;
  function attempt(){
    if (i >= PROXIES.length) return Promise.reject(new Error('all proxies failed'));
    var u = PROXIES[i++](feed.url);
    return fetchTimeout(u, 9000).then(function(txt){
      if (txt.indexOf('<') === -1) throw new Error('not xml');
      return txt;
    }).catch(function(){ return attempt(); });
  }
  return attempt();
}

/* ---------- parsing (RSS 2.0, RDF, Atom) ---------- */
function textOf(el, names){
  for (var i=0;i<names.length;i++){
    var kids = el.getElementsByTagName('*');
    for (var j=0;j<kids.length;j++){
      var n = kids[j];
      var ln = (n.localName || n.nodeName || '').toLowerCase();
      if (ln === names[i] && n.textContent) return n.textContent.trim();
    }
  }
  return '';
}
function parseFeed(xml, feed){
  var doc;
  try { doc = new DOMParser().parseFromString(xml, 'text/xml'); } catch(e){ return []; }
  if (!doc || doc.getElementsByTagName('parsererror').length){
    // some proxies wrap in html — try to salvage
    var m = xml.match(/<\?xml[\s\S]*$/);
    if (m) { try { doc = new DOMParser().parseFromString(m[0],'text/xml'); } catch(e){ return []; } }
    if (!doc || doc.getElementsByTagName('parsererror').length) return [];
  }
  var nodes = doc.getElementsByTagName('item');
  if (!nodes.length) nodes = doc.getElementsByTagName('entry');
  var out = [];
  for (var i=0; i<nodes.length && out.length<PER_FEED; i++){
    var n = nodes[i];
    var title = textOf(n, ['title']);
    if (!title) continue;
    var link = '';
    var links = n.getElementsByTagName('link');
    for (var j=0;j<links.length;j++){
      var l = links[j];
      var rel = l.getAttribute && l.getAttribute('rel');
      var href = (l.getAttribute && l.getAttribute('href')) || l.textContent || '';
      if (href && (!rel || rel === 'alternate')) { link = href.trim(); break; }
    }
    if (!link) link = textOf(n, ['guid']);
    if (!link || link.indexOf('http') !== 0) continue;
    var dateStr = textOf(n, ['pubdate','published','updated','date']);
    var t = Date.parse(dateStr);
    if (isNaN(t)) t = Date.now() - 6*3600e3;
    out.push({
      id: hash(link),
      title: title.replace(/<[^>]*>/g,''),
      link: link,
      time: t,
      src: feed.name,
      lang: feed.lang || ''
    });
  }
  return out;
}

/* ---------- load section ---------- */
function normTitle(t){ return t.toLowerCase().replace(/[^a-z0-9æøå ]/g,'').slice(0,60); }
function loadAll(force){
  if (loading) return;
  var cached = null;
  try { cached = JSON.parse(store.get('ob_cache') || 'null'); } catch(e){}
  if (cached && !force && (Date.now() - cached.ts) < CACHE_MIN*60e3){
    items = cached.items; failed = cached.failed || [];
    render(); return;
  }
  if (cached){ items = cached.items; render(); } // show stale while updating
  loading = true;
  var run = ++runSeq;
  setSpin(true);
  setStatus('Fetching your sources…');
  var done = 0, total = 0;
  var newItems = {}; var newFailed = [];
  SECTIONS.forEach(function(sec){ newItems[sec.id] = []; total += sec.feeds.length; });
  var ps = [];
  SECTIONS.forEach(function(sec){
    sec.feeds.forEach(function(feed){
      ps.push(
        fetchFeed(feed)
          .then(function(xml){ newItems[sec.id] = newItems[sec.id].concat(parseFeed(xml, feed)); })
          .catch(function(){ newFailed.push(feed.name); })
          .then(function(){ done++; if (run === runSeq) setStatus('Fetching your sources… ' + done + '/' + total); })
      );
    });
  });
  Promise.all(ps).then(function(){
    if (run !== runSeq) return; // a newer refresh superseded this one
    SECTIONS.forEach(function(sec){
      var seen = {};
      newItems[sec.id] = newItems[sec.id]
        .sort(function(a,b){ return b.time - a.time; })
        .filter(function(it){
          var k = normTitle(it.title);
          if (seen[k]) return false; seen[k]=1;
          // don't resurface items older than 3 days
          return (Date.now() - it.time) < 3*24*3600e3 || true;
        })
        .slice(0, PER_SECTION);
    });
    var any = SECTIONS.some(function(s){ return newItems[s.id].length; });
    if (any){
      items = newItems; failed = newFailed;
      store.set('ob_cache', JSON.stringify({ts: Date.now(), items: items, failed: failed}));
      saveRead();
      setStatus('Updated ' + fmtClock(new Date()));
    } else {
      failed = newFailed;
      setStatus(cached ? 'Couldn’t refresh — showing last saved stories' : 'No connection — try again');
    }
    loading = false; setSpin(false); render();
    setTimeout(function(){ setStatus(''); }, 2500);
  });
}

/* ---------- render ---------- */
function ago(t){
  var s = (Date.now()-t)/1e3;
  if (s < 3600) return Math.max(1, Math.round(s/60)) + 'm';
  if (s < 86400) return Math.round(s/3600) + 'h';
  return Math.round(s/86400) + 'd';
}
function fmtClock(d){ return ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2); }
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function unreadIn(sid){
  return (items[sid]||[]).filter(function(it){ return !readSet[it.id]; }).length;
}
function render(){
  renderTabs();
  var list = document.getElementById('list');
  var arr = items[current] || [];
  if (!arr.length && loading){
    list.innerHTML = '<div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>';
    return;
  }
  var unread = arr.filter(function(it){ return !readSet[it.id]; });
  var read = arr.filter(function(it){ return readSet[it.id]; });
  var html = '';
  if (!unread.length && arr.length){
    var dk = current === 'danmark';
    html += '<div class="done"><div class="big">☀️</div><div class="msg">' +
      (dk ? 'Du er helt opdateret' : 'You’re all caught up') +
      '</div><div class="sub">' +
      (dk ? 'Ikke mere at scrolle. Gå ud og nyd dagen — eller øv lidt dansk.' :
            'That’s everything worth reading here. The feed has a bottom — this is it.') +
      '</div></div>';
  }
  unread.concat(read).forEach(function(it){
    var isRead = !!readSet[it.id];
    html += '<a class="card' + (isRead?' read':'') + '" data-id="' + it.id + '" href="' + esc(it.link) + '" target="_blank" rel="noopener">' +
      '<div class="meta"><span class="src">' + esc(it.src) + '</span>' +
      (it.lang ? '<span class="lang">' + it.lang + '</span>' : '') +
      '<span class="ago">' + ago(it.time) + '</span></div>' +
      '<h2>' + esc(it.title) + '</h2></a>';
  });
  if (!arr.length && !loading){
    html = '<div class="done"><div class="big">📡</div><div class="msg">Nothing loaded yet</div><div class="sub">Tap refresh to fetch stories.</div></div>';
  }
  list.innerHTML = html;
  var fn = document.getElementById('failnote');
  fn.textContent = failed.length ? ('Unavailable right now: ' + failed.join(', ')) : '';
  var totalUnread = 0;
  SECTIONS.forEach(function(s){ totalUnread += unreadIn(s.id); });
  document.getElementById('totalCount').textContent = totalUnread ? totalUnread + ' unread' : '';
}
function renderTabs(){
  var bar = document.getElementById('tabbar');
  var html = '';
  SECTIONS.forEach(function(s){
    var u = unreadIn(s.id);
    html += '<button class="tab' + (s.id===current?' active':'') + '" data-tab="' + s.id + '">' +
      '<span class="badge' + (u?'':' zero') + '">' + u + '</span>' +
      '<span class="ico">' + s.icon + '</span><span class="lbl">' + s.label + '</span></button>';
  });
  bar.innerHTML = html;
}

/* ---------- events ---------- */
document.getElementById('tabbar').addEventListener('click', function(e){
  var b = e.target.closest('.tab'); if (!b) return;
  current = b.getAttribute('data-tab');
  store.set('ob_tab', current);
  window.scrollTo(0,0);
  render();
});
document.getElementById('list').addEventListener('click', function(e){
  var a = e.target.closest('.card'); if (!a) return;
  var id = a.getAttribute('data-id');
  if (!readSet[id]){ readSet[id] = 1; store.set('ob_read', JSON.stringify(readSet)); }
  a.classList.add('read');
  setTimeout(render, 400);
});
document.getElementById('refreshBtn').addEventListener('click', function(){ loadAll(true); });
document.getElementById('markAllBtn').addEventListener('click', function(){
  (items[current]||[]).forEach(function(it){ readSet[it.id] = 1; });
  store.set('ob_read', JSON.stringify(readSet));
  render();
});
function setStatus(t){ document.getElementById('status').textContent = t; }
function setSpin(on){ document.getElementById('refreshBtn').classList.toggle('spin', on); }
document.addEventListener('visibilitychange', function(){
  if (!document.hidden) loadAll(false);
});

/* ---------- go ---------- */
render();
loadAll(false);
</script>
</body>
</html>
